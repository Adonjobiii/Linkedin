<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Diecast Elite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="liquid-bg">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>
    <div class="auth-container">
        <a href="/" class="logo auth-logo">DIECAST<span>ELITE</span></a>
        <div class="auth-card large">
            <h1>Join the Elite</h1>
            <form action="/signup" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" required placeholder="First & Last Name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" required placeholder="Phone number">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="Email address">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <input type="text" name="address" required placeholder="Full shipping address">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Password">
                </div>
                <button type="submit" class="auth-btn">CREATE ACCOUNT</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign In</a></p>
            </div>
        </div>
    </div>
</body>
</html>
